<main class="login-page" aria-labelledby="login-title">
  <section class="login-card">
    <header>
      <p class="eyebrow">Oficina SOAT</p>
      <h1 id="login-title">Acesso operacional</h1>
      <p>Entre com a credencial fornecida pela administração da oficina.</p>
    </header>

    @if (failure()) {
      <app-alert title="Não foi possível entrar" tone="danger">
        <p>{{ failure() }}</p>
        @if (correlationId()) {
          <p class="correlation">Referência: {{ correlationId() }}</p>
        }
      </app-alert>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <app-form-field
        inputId="cpf"
        label="CPF"
        hint="Digite somente os 11 números."
        messageId="cpf-message"
        [required]="true"
        [error]="
          form.controls.cpf.touched && form.controls.cpf.invalid
            ? 'Informe um CPF válido.'
            : undefined
        "
      >
        <input
          id="cpf"
          formControlName="cpf"
          inputmode="numeric"
          autocomplete="username"
          maxlength="11"
          aria-describedby="cpf-message"
          [attr.aria-invalid]="form.controls.cpf.touched && form.controls.cpf.invalid"
        />
      </app-form-field>

      <app-form-field
        inputId="password"
        label="Senha"
        messageId="password-message"
        [required]="true"
        [error]="
          form.controls.password.touched && form.controls.password.invalid
            ? 'Informe sua senha.'
            : undefined
        "
      >
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          aria-describedby="password-message"
          [attr.aria-invalid]="form.controls.password.touched && form.controls.password.invalid"
        />
      </app-form-field>

      <button class="ui-button ui-button--primary" type="submit" [disabled]="pending()">
        {{ pending() ? 'Entrando…' : 'Entrar' }}
      </button>
      <a routerLink="/ativar-credencial">Ativar minha credencial</a>
    </form>
  </section>
</main>
