openapi: 3.1.0
info:
  title: oficina-billing-service API
  version: 1.3.0
  description: Contrato REST v1 para orcamentos, decisoes publicas por capability, recusas e pagamentos.
  license:
    name: Internal
    identifier: LicenseRef-Internal
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Orcamentos
    description: Operacoes de geracao, consulta, aprovacao e recusa de orcamentos.
  - name: Decisao publica
    description: Acompanhamento, confirmacao e decisao do cliente por token de capacidade de uso unico.
  - name: Pagamentos
    description: Operacoes de registro, consulta, confirmacao, recusa e cancelamento de pagamentos.
  - name: Dashboard
    description: Leitura agregada das atenções de orçamento e pagamento.
paths:
  /dashboard/faturamento:
    get:
      tags: [Dashboard]
      summary: Consultar resumo operacional do faturamento
      operationId: consultarDashboardFaturamento
      x-required-roles: [administrativo, recepcionista]
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Snapshot atual de orçamentos e pagamentos que exigem atenção.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardFaturamentoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /orcamentos:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Orcamentos]
      summary: Gerar orcamento
      operationId: gerarOrcamento
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GerarOrcamentoRequest"
            examples:
              orcamento:
                value:
                  ordemServicoId: d290f1ee-6c54-4b01-90e6-d701748f0851
      responses:
        "201":
          description: Orcamento gerado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Orcamento"
              examples:
                orcamento:
                  value:
                    orcamentoId: 53c52fe8-13cf-4568-9a64-d4f548134b8b
                    ordemServicoId: d290f1ee-6c54-4b01-90e6-d701748f0851
                    itens:
                      - tipo: PECA
                        itemId: 19fdd9ab-cf1f-4074-a96b-80ae86fba7b0
                        nome: Volante
                        quantidade: 2.0
                        valorUnitario: 50.0
                        valorTotal: 100.0
                      - tipo: SERVICO
                        itemId: b96e7e7f-b1f7-4c55-b42a-61c53ab06caa
                        nome: Troca de oleo
                        quantidade: 1.0
                        valorUnitario: 250.0
                        valorTotal: 250.0
                    valorTotal: 350.0
                    status: GERADO
                    criadoEm: "2026-06-23T15:30:00Z"
                    atualizadoEm: "2026-06-23T15:30:00Z"
                    acoesPermitidas: [APROVAR, RECUSAR]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /orcamentos/{orcamentoId}:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    get:
      tags: [Orcamentos]
      summary: Consultar orcamento
      operationId: consultarOrcamento
      parameters:
        - $ref: "#/components/parameters/OrcamentoId"
      responses:
        "200":
          description: Orcamento encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Orcamento"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /ordens-servico/{ordemServicoId}/orcamentos:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    get:
      tags: [Orcamentos]
      summary: Consultar orcamento da OS
      operationId: consultarOrcamentosDaOrdemServico
      parameters:
        - $ref: "#/components/parameters/OrdemServicoId"
      responses:
        "200":
          description: Orcamentos da OS encontrados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Orcamento"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /orcamentos/{orcamentoId}/aprovacao:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Orcamentos]
      summary: Aprovar orcamento
      operationId: aprovarOrcamento
      parameters:
        - $ref: "#/components/parameters/OrcamentoId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisaoOrcamentoRequest"
      responses:
        "200":
          description: Orcamento aprovado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Orcamento"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /orcamentos/{orcamentoId}/recusa:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Orcamentos]
      summary: Recusar orcamento
      operationId: recusarOrcamento
      parameters:
        - $ref: "#/components/parameters/OrcamentoId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisaoOrcamentoRequest"
      responses:
        "200":
          description: Orcamento recusado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Orcamento"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /ordens-servico/{ordemServicoId}/acompanhar-link:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
      - $ref: "#/components/parameters/OrdemServicoId"
      - $ref: "#/components/parameters/ActionToken"
    get:
      tags: [Decisao publica]
      summary: Acompanhar a Ordem de Servico pelo link do cliente
      operationId: acompanharOrdemServicoPorLink
      security: []
      responses:
        "200":
          $ref: "#/components/responses/MagicLinkHtml"
        "401":
          $ref: "#/components/responses/MagicLinkUnauthorized"
  /ordens-servico/{ordemServicoId}/aprovar-link:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
      - $ref: "#/components/parameters/OrdemServicoId"
    get:
      tags: [Decisao publica]
      summary: Abrir a confirmacao de aprovacao do orcamento
      operationId: abrirAprovacaoOrcamentoPorLink
      security: []
      parameters:
        - $ref: "#/components/parameters/ActionToken"
      responses:
        "200":
          $ref: "#/components/responses/MagicLinkHtml"
        "401":
          $ref: "#/components/responses/MagicLinkUnauthorized"
    post:
      tags: [Decisao publica]
      summary: Confirmar a aprovacao do orcamento
      operationId: confirmarAprovacaoOrcamentoPorLink
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/DecisaoPublicaRequest"
      responses:
        "200":
          $ref: "#/components/responses/MagicLinkHtml"
        "401":
          $ref: "#/components/responses/MagicLinkUnauthorized"
        "409":
          $ref: "#/components/responses/MagicLinkConflict"
  /ordens-servico/{ordemServicoId}/recusar-link:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
      - $ref: "#/components/parameters/OrdemServicoId"
    get:
      tags: [Decisao publica]
      summary: Abrir a confirmacao de recusa do orcamento
      operationId: abrirRecusaOrcamentoPorLink
      security: []
      parameters:
        - $ref: "#/components/parameters/ActionToken"
      responses:
        "200":
          $ref: "#/components/responses/MagicLinkHtml"
        "401":
          $ref: "#/components/responses/MagicLinkUnauthorized"
    post:
      tags: [Decisao publica]
      summary: Confirmar a recusa do orcamento
      operationId: confirmarRecusaOrcamentoPorLink
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/DecisaoPublicaRequest"
      responses:
        "200":
          $ref: "#/components/responses/MagicLinkHtml"
        "401":
          $ref: "#/components/responses/MagicLinkUnauthorized"
        "409":
          $ref: "#/components/responses/MagicLinkConflict"
  /pagamentos:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Pagamentos]
      summary: Registrar pagamento
      operationId: registrarPagamento
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PagamentoCreateRequest"
            examples:
              pagamento:
                value:
                  ordemServicoId: d290f1ee-6c54-4b01-90e6-d701748f0851
                  orcamentoId: 53c52fe8-13cf-4568-9a64-d4f548134b8b
                  valor: 350.0
                  metodo: PIX
      responses:
        "201":
          description: Pagamento registrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagamento"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /pagamentos/{pagamentoId}:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    get:
      tags: [Pagamentos]
      summary: Consultar pagamento
      operationId: consultarPagamento
      parameters:
        - $ref: "#/components/parameters/PagamentoId"
      responses:
        "200":
          description: Pagamento encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagamento"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /ordens-servico/{ordemServicoId}/pagamentos:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    get:
      tags: [Pagamentos]
      summary: Consultar pagamentos da OS
      operationId: consultarPagamentosDaOrdemServico
      parameters:
        - $ref: "#/components/parameters/OrdemServicoId"
      responses:
        "200":
          description: Pagamentos da OS encontrados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pagamento"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /pagamentos/{pagamentoId}/confirmacao:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Pagamentos]
      summary: Confirmar pagamento
      operationId: confirmarPagamento
      parameters:
        - $ref: "#/components/parameters/PagamentoId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmacaoPagamentoRequest"
      responses:
        "200":
          description: Pagamento confirmado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagamento"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /pagamentos/{pagamentoId}/recusa:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Pagamentos]
      summary: Recusar pagamento
      operationId: recusarPagamento
      parameters:
        - $ref: "#/components/parameters/PagamentoId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecusaPagamentoRequest"
      responses:
        "200":
          description: Pagamento recusado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagamento"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /pagamentos/{pagamentoId}/cancelamento:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Pagamentos]
      summary: Cancelar pagamento
      operationId: cancelarPagamento
      parameters:
        - $ref: "#/components/parameters/PagamentoId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelamentoRequest"
      responses:
        "200":
          description: Pagamento cancelado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pagamento"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Identificador de correlacao aceito do cliente e propagado em chamadas HTTP, eventos, logs e traces, conforme contracts/error-model.md.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    OrcamentoId:
      name: orcamentoId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PagamentoId:
      name: pagamentoId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrdemServicoId:
      name: ordemServicoId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: true
      description: Chave obrigatoria neste servico para retries seguros em operacoes POST ou PATCH com efeito colateral, conforme contracts/idempotency.md.
      schema:
        type: string
        minLength: 8
        maxLength: 128
    ActionToken:
      name: actionToken
      in: query
      required: true
      description: Token opaco de capacidade, restrito a acao e nunca registrado em telemetria.
      schema:
        type: string
        minLength: 43
        maxLength: 128
  headers:
    CorrelationId:
      description: Identificador de correlacao retornado em toda resposta de erro.
      schema:
        type: string
    Traceparent:
      description: Contexto de trace W3C retornado quando houver instrumentacao distribuida.
      schema:
        type: string
    RetryAfter:
      description: Tempo recomendado para nova tentativa quando a chave de idempotencia ainda estiver em processamento.
      schema:
        type: integer
        minimum: 1
  responses:
    BadRequest:
      description: Requisicao invalida.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Token JWT ausente, invalido ou expirado.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Token JWT válido sem um dos papéis exigidos.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso nao encontrado.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflito de estado, duplicidade ou idempotencia.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadGateway:
      description: Falha ao integrar com provedor financeiro externo.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Provedor financeiro externo indisponivel ou configuracao obrigatoria ausente.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    MagicLinkHtml:
      description: Pagina HTML segura de acompanhamento, confirmacao ou resultado.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
      content:
        text/html:
          schema:
            type: string
    MagicLinkUnauthorized:
      description: Link invalido, expirado, incompatível ou ja utilizado; a pagina nao distingue a causa.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
      content:
        text/html:
          schema:
            type: string
    MagicLinkConflict:
      description: O orcamento nao aceita mais a decisao solicitada.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
      content:
        text/html:
          schema:
            type: string
  schemas:
    DashboardFaturamentoResponse:
      type: object
      required: [generatedAt, dataAsOf, contagensOrcamentos, contagensPagamentos, atencoes]
      properties:
        generatedAt:
          type: string
          format: date-time
        dataAsOf:
          type: string
          format: date-time
          description: Limite temporal do snapshot atual. A primeira versão não oferece séries históricas.
        refreshAfterSeconds:
          type: integer
          minimum: 15
        contagensOrcamentos:
          type: array
          items:
            $ref: "#/components/schemas/ContagemOrcamentoPorStatus"
        contagensPagamentos:
          type: array
          items:
            $ref: "#/components/schemas/ContagemPagamentoPorStatus"
        atencoes:
          type: array
          maxItems: 5
          items:
            $ref: "#/components/schemas/FaturamentoAtencaoDashboard"
    ContagemOrcamentoPorStatus:
      type: object
      required: [status, quantidade]
      properties:
        status:
          $ref: "#/components/schemas/StatusOrcamento"
        quantidade:
          type: integer
          format: int64
          minimum: 0
    ContagemPagamentoPorStatus:
      type: object
      required: [status, quantidade]
      properties:
        status:
          $ref: "#/components/schemas/StatusPagamento"
        quantidade:
          type: integer
          format: int64
          minimum: 0
    FaturamentoAtencaoDashboard:
      type: object
      required: [tipo, ordemServicoId, referenciaId, status, valor, atualizadoEm, acoesPermitidas]
      properties:
        tipo:
          type: string
          enum: [ORCAMENTO, PAGAMENTO]
        ordemServicoId:
          type: string
          format: uuid
        referenciaId:
          type: string
          format: uuid
          description: Identificador do orçamento ou pagamento, conforme `tipo`.
        status:
          description: Valor canônico conforme `tipo`.
          oneOf:
            - $ref: "#/components/schemas/StatusOrcamento"
            - $ref: "#/components/schemas/StatusPagamento"
        valor:
          type: number
          format: decimal
          minimum: 0
        atualizadoEm:
          type: string
          format: date-time
        acoesPermitidas:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/AcaoPermitidaOrcamento"
              - $ref: "#/components/schemas/AcaoPermitidaPagamento"
          description: Ações canônicas do recurso indicado por `tipo`.
    GerarOrcamentoRequest:
      type: object
      required: [ordemServicoId]
      properties:
        ordemServicoId:
          type: string
          format: uuid
    DecisaoOrcamentoRequest:
      type: object
      properties:
        motivo:
          type: string
    DecisaoPublicaRequest:
      type: object
      required: [actionToken]
      properties:
        actionToken:
          type: string
          minLength: 43
          maxLength: 128
          description: Token opaco submetido pelo formulario de confirmacao; nunca deve ser logado.
        motivo:
          type: string
          maxLength: 500
    Orcamento:
      type: object
      required: [orcamentoId, ordemServicoId, itens, valorTotal, status, criadoEm, atualizadoEm, acoesPermitidas]
      properties:
        orcamentoId:
          type: string
          format: uuid
        ordemServicoId:
          type: string
          format: uuid
        itens:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ItemOrcamento"
        valorTotal:
          type: number
          format: decimal
          minimum: 0
        status:
          $ref: "#/components/schemas/StatusOrcamento"
        criadoEm:
          type: string
          format: date-time
        atualizadoEm:
          type: string
          format: date-time
        acoesPermitidas:
          type: array
          items:
            $ref: "#/components/schemas/AcaoPermitidaOrcamento"
    AcaoPermitidaOrcamento:
      type: string
      enum: [APROVAR, RECUSAR]
    StatusOrcamento:
      type: string
      enum: [GERADO, APROVADO, RECUSADO]
    ItemOrcamento:
      type: object
      required: [tipo, itemId, nome, quantidade, valorUnitario, valorTotal]
      properties:
        tipo:
          $ref: "#/components/schemas/TipoItemOrcamento"
        itemId:
          type: string
          format: uuid
          description: Identificador do item de peca ou servico na Ordem de Servico.
        referenciaCatalogoId:
          type: string
          format: uuid
          description: Identificador opcional do item no catalogo tecnico do execution service.
        nome:
          type: string
        quantidade:
          type: number
          format: decimal
          exclusiveMinimum: 0
        valorUnitario:
          type: number
          format: decimal
          minimum: 0
        valorTotal:
          type: number
          format: decimal
          minimum: 0
    TipoItemOrcamento:
      type: string
      enum: [PECA, SERVICO]
    PagamentoCreateRequest:
      type: object
      required: [ordemServicoId, orcamentoId, valor, metodo]
      properties:
        ordemServicoId:
          type: string
          format: uuid
        orcamentoId:
          type: string
          format: uuid
        valor:
          type: number
          format: decimal
          minimum: 0
        metodo:
          $ref: "#/components/schemas/MetodoPagamento"
    ConfirmacaoPagamentoRequest:
      type: object
      properties:
        provedor:
          type: string
          example: mercado-pago
        transacaoExternaId:
          type: string
    RecusaPagamentoRequest:
      type: object
      properties:
        provedor:
          type: string
          example: mercado-pago
        motivo:
          type: string
    CancelamentoRequest:
      type: object
      properties:
        motivo:
          type: string
    Pagamento:
      allOf:
        - $ref: "#/components/schemas/PagamentoCreateRequest"
        - type: object
          required: [pagamentoId, status, criadoEm, atualizadoEm, acoesPermitidas]
          properties:
            pagamentoId:
              type: string
              format: uuid
            status:
              $ref: "#/components/schemas/StatusPagamento"
            provedor:
              type: string
              example: mercado-pago
            transacaoExternaId:
              type: string
            criadoEm:
              type: string
              format: date-time
            atualizadoEm:
              type: string
              format: date-time
            acoesPermitidas:
              type: array
              items:
                $ref: "#/components/schemas/AcaoPermitidaPagamento"
    AcaoPermitidaPagamento:
      type: string
      enum: [CONFIRMAR, RECUSAR, CANCELAR]
    MetodoPagamento:
      type: string
      enum: [PIX, CARTAO_CREDITO, CARTAO_DEBITO, DINHEIRO]
    StatusPagamento:
      type: string
      enum: [CRIADO, CONFIRMADO, RECUSADO, CANCELADO]
    ErrorResponse:
      type: object
      required: [timestamp, status, error, code, message, path, correlationId]
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-06-23T15:30:00Z"
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Campo obrigatorio ausente.
        path:
          type: string
          example: /api/v1/orcamentos
        correlationId:
          type: string
          example: 7f4d0c4b6b8a4bb8a2f49bb8f06e1c3d
        requestId:
          type: string
          format: uuid
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        traceId:
          type: string
          example: 4bf92f3577b34da6a3ce929d0e0e4736
        spanId:
          type: string
          example: 00f067aa0ba902b7
        service:
          type: string
          example: oficina-billing-service
        logReference:
          type: string
          example: oficina-billing-service/2026-06-23/7f4d0c4b6b8a4bb8a2f49bb8f06e1c3d
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        field:
          type: string
          example: ordemServicoId
        code:
          type: string
          example: REQUIRED
        message:
          type: string
          example: Campo obrigatorio.
