openapi: 3.1.0
info:
  title: oficina-os-service API
  version: 1.2.0
  description: Contrato REST v1 para usuários operacionais, clientes, veículos, ordens de serviço, estados e histórico da OS.
  license:
    name: Internal
    identifier: LicenseRef-Internal
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Usuarios
    description: CRUD administrativo de pessoas e usuários operacionais. Todas as operações exigem o papel administrativo.
  - name: Clientes
    description: Operacoes de cadastro e consulta de clientes.
  - name: Veiculos
    description: Operacoes de cadastro e consulta de veiculos.
  - name: Ordens de Servico
    description: Operacoes de abertura, consulta, estado e historico de ordens de servico.
paths:
  /usuarios:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Usuarios]
      summary: Criar usuário operacional
      description: Cria o cadastro operacional de Pessoa e Usuário, persiste usuarioAdicionado na Outbox e não recebe nem persiste credenciais de autenticação.
      operationId: criarUsuario
      x-required-roles: [administrativo]
      x-publishes-events: [usuarioAdicionado]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsuarioCreateRequest"
            examples:
              mecanico:
                value:
                  nome: Ana Silva
                  documento: "84191404067"
                  status: ATIVO
                  papeis: [mecanico]
      responses:
        "201":
          description: Usuário operacional criado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      tags: [Usuarios]
      summary: Consultar usuários operacionais
      operationId: consultarUsuarios
      x-required-roles: [administrativo]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - name: nome
          in: query
          description: Trecho do nome, sem distinção entre maiúsculas e minúsculas.
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: documento
          in: query
          description: CPF completo com 11 dígitos.
          schema:
            type: string
            pattern: '^\d{11}$'
        - name: status
          in: query
          description: Estado operacional canônico.
          schema:
            $ref: "#/components/schemas/StatusUsuario"
        - name: papel
          in: query
          description: Papel operacional canônico.
          schema:
            $ref: "#/components/schemas/PapelUsuario"
      responses:
        "200":
          description: Usuários operacionais encontrados.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PageResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Usuario"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /usuarios/{usuarioId}:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    get:
      tags: [Usuarios]
      summary: Consultar usuário operacional
      operationId: consultarUsuario
      x-required-roles: [administrativo]
      parameters:
        - $ref: "#/components/parameters/UsuarioId"
      responses:
        "200":
          description: Usuário operacional encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Usuarios]
      summary: Atualizar dados do usuário operacional
      description: Substitui nome, CPF e papéis do cadastro operacional, preserva o estado atual e persiste usuarioAtualizado na Outbox. Credenciais não pertencem a este recurso.
      operationId: atualizarUsuario
      x-required-roles: [administrativo]
      x-publishes-events: [usuarioAtualizado]
      parameters:
        - $ref: "#/components/parameters/UsuarioId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsuarioUpdateRequest"
      responses:
        "200":
          description: Dados do usuário operacional atualizados.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [Usuarios]
      summary: Inativar usuário operacional
      description: Exclusão lógica e idempotente que altera o status para INATIVO, preserva Pessoa e papéis e publica usuarioExcluido somente na primeira transição.
      operationId: inativarUsuario
      x-required-roles: [administrativo]
      x-publishes-events: [usuarioExcluido]
      parameters:
        - $ref: "#/components/parameters/UsuarioId"
      responses:
        "204":
          description: Usuário operacional inativado, inclusive quando já estava inativo.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /usuarios/{usuarioId}/bloqueio:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
      - $ref: "#/components/parameters/UsuarioId"
    post:
      tags: [Usuarios]
      summary: Bloquear usuário operacional
      operationId: bloquearUsuario
      x-required-roles: [administrativo]
      x-publishes-events: [usuarioAtualizado]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Usuário bloqueado ou representação atual quando já estava bloqueado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /usuarios/{usuarioId}/reativacao:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
      - $ref: "#/components/parameters/UsuarioId"
    post:
      tags: [Usuarios]
      summary: Reativar usuário operacional
      operationId: reativarUsuario
      x-required-roles: [administrativo]
      x-publishes-events: [usuarioAtualizado]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Usuário ativo ou representação atual quando já estava ativo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /clientes:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Clientes]
      summary: Criar cliente
      operationId: criarCliente
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClienteCreateRequest"
            examples:
              cliente:
                value:
                  nome: Maria Souza
                  documento: "12345678901"
                  telefone: "+5511999999999"
                  email: maria@example.com
      responses:
        "201":
          description: Cliente criado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      tags: [Clientes]
      summary: Consultar clientes
      operationId: consultarClientes
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Clientes encontrados.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PageResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Cliente"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /clientes/{clienteId}:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    get:
      tags: [Clientes]
      summary: Consultar cliente
      operationId: consultarCliente
      parameters:
        - $ref: "#/components/parameters/ClienteId"
      responses:
        "200":
          description: Cliente encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Clientes]
      summary: Atualizar cliente
      operationId: atualizarCliente
      parameters:
        - $ref: "#/components/parameters/ClienteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClienteUpdateRequest"
      responses:
        "200":
          description: Cliente atualizado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /clientes/{clienteId}/veiculos:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Veiculos]
      summary: Criar veiculo para cliente
      operationId: criarVeiculo
      parameters:
        - $ref: "#/components/parameters/ClienteId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VeiculoCreateRequest"
            examples:
              veiculo:
                value:
                  placa: ABC1D23
                  marca: Volkswagen
                  modelo: Gol
                  ano: 2020
      responses:
        "201":
          description: Veiculo criado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Veiculo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      tags: [Veiculos]
      summary: Consultar veiculos do cliente
      operationId: consultarVeiculosDoCliente
      parameters:
        - $ref: "#/components/parameters/ClienteId"
      responses:
        "200":
          description: Veiculos encontrados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Veiculo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /veiculos/{veiculoId}:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    get:
      tags: [Veiculos]
      summary: Consultar veiculo
      operationId: consultarVeiculo
      parameters:
        - $ref: "#/components/parameters/VeiculoId"
      responses:
        "200":
          description: Veiculo encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Veiculo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Veiculos]
      summary: Atualizar veiculo
      operationId: atualizarVeiculo
      parameters:
        - $ref: "#/components/parameters/VeiculoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VeiculoUpdateRequest"
      responses:
        "200":
          description: Veiculo atualizado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Veiculo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /ordens-servico:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Ordens de Servico]
      summary: Abrir OS
      operationId: abrirOrdemServico
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrdemServicoCreateRequest"
            examples:
              ordemServico:
                value:
                  clienteId: d290f1ee-6c54-4b01-90e6-d701748f0851
                  veiculoId: 7b1f1a8d-7f4a-4f25-8e74-27d50210a61e
                  descricaoProblema: Veiculo nao liga
      responses:
        "201":
          description: Ordem de servico criada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdemServico"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      tags: [Ordens de Servico]
      summary: Consultar OS
      operationId: consultarOrdensServico
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - name: estado
          in: query
          schema:
            $ref: "#/components/schemas/EstadoOrdemServico"
      responses:
        "200":
          description: Ordens de servico encontradas.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PageResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/OrdemServico"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /ordens-servico/{ordemServicoId}:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    get:
      tags: [Ordens de Servico]
      summary: Consultar OS por id
      operationId: consultarOrdemServico
      parameters:
        - $ref: "#/components/parameters/OrdemServicoId"
      responses:
        "200":
          description: Ordem de servico encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdemServico"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /ordens-servico/{ordemServicoId}/historico:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    get:
      tags: [Ordens de Servico]
      summary: Consultar historico
      operationId: consultarHistoricoOrdemServico
      parameters:
        - $ref: "#/components/parameters/OrdemServicoId"
      responses:
        "200":
          description: Historico encontrado.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoricoOrdemServico"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /ordens-servico/{ordemServicoId}/servicos:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Ordens de Servico]
      summary: Incluir servico na OS
      operationId: incluirServicoNaOrdemServico
      parameters:
        - $ref: "#/components/parameters/OrdemServicoId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncluirServicoOrdemServicoRequest"
      responses:
        "200":
          description: Servico incluido e composicao atualizada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdemServico"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /ordens-servico/{ordemServicoId}/pecas:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Ordens de Servico]
      summary: Incluir peca na OS
      operationId: incluirPecaNaOrdemServico
      parameters:
        - $ref: "#/components/parameters/OrdemServicoId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncluirPecaOrdemServicoRequest"
      responses:
        "200":
          description: Peca incluida e composicao atualizada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdemServico"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /ordens-servico/{ordemServicoId}/estado:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    patch:
      tags: [Ordens de Servico]
      summary: Alterar estado
      operationId: alterarEstadoOrdemServico
      parameters:
        - $ref: "#/components/parameters/OrdemServicoId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlterarEstadoRequest"
            examples:
              alterarEstado:
                value:
                  estado: EM_DIAGNOSTICO
                  motivo: Diagnostico iniciado
      responses:
        "200":
          description: Estado alterado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdemServico"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /ordens-servico/{ordemServicoId}/cancelamento:
    parameters:
      - $ref: "#/components/parameters/CorrelationId"
    post:
      tags: [Ordens de Servico]
      summary: Cancelar OS
      operationId: cancelarOrdemServico
      parameters:
        - $ref: "#/components/parameters/OrdemServicoId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelamentoRequest"
      responses:
        "202":
          description: Cancelamento aceito para processamento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperacaoAssincrona"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Identificador de correlacao aceito do cliente e propagado em chamadas HTTP, eventos, logs e traces, conforme contracts/error-model.md.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    UsuarioId:
      name: usuarioId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ClienteId:
      name: clienteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VeiculoId:
      name: veiculoId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrdemServicoId:
      name: ordemServicoId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: true
      description: Chave obrigatoria neste servico para retries seguros em operacoes POST ou PATCH com efeito colateral, conforme contracts/idempotency.md.
      schema:
        type: string
        minLength: 8
        maxLength: 128
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  headers:
    CorrelationId:
      description: Identificador de correlacao retornado em toda resposta de erro.
      schema:
        type: string
    Traceparent:
      description: Contexto de trace W3C retornado quando houver instrumentacao distribuida.
      schema:
        type: string
    RetryAfter:
      description: Tempo recomendado para nova tentativa quando a chave de idempotencia ainda estiver em processamento.
      schema:
        type: integer
        minimum: 1
  responses:
    BadRequest:
      description: Requisicao invalida.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Token JWT ausente, invalido ou expirado.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Token JWT válido sem o papel administrativo exigido pela operação.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso nao encontrado.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflito de estado, duplicidade ou idempotencia.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Dependencia necessaria para concluir a operacao esta indisponivel.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        traceparent:
          $ref: "#/components/headers/Traceparent"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    UsuarioCreateRequest:
      type: object
      required: [nome, documento, papeis]
      properties:
        nome:
          type: string
          minLength: 1
          maxLength: 255
        documento:
          type: string
          pattern: "^[0-9]{11}$"
          description: CPF da pessoa física, sem formatação.
        status:
          allOf:
            - $ref: "#/components/schemas/StatusUsuario"
          default: ATIVO
        papeis:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/PapelUsuario"
    UsuarioUpdateRequest:
      type: object
      required: [nome, documento, papeis]
      properties:
        nome:
          type: string
          minLength: 1
          maxLength: 255
        documento:
          type: string
          pattern: "^[0-9]{11}$"
          description: CPF da pessoa física, sem formatação.
        papeis:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/PapelUsuario"
    Usuario:
      type: object
      required: [usuarioId, pessoaId, nome, documento, tipoPessoa, status, papeis, acoesPermitidas, criadoEm, atualizadoEm]
      properties:
        usuarioId:
          type: string
          format: uuid
        pessoaId:
          type: string
          format: uuid
        nome:
          type: string
        documento:
          type: string
          pattern: "^[0-9]{11}$"
        tipoPessoa:
          type: string
          enum: [FISICA]
        status:
          $ref: "#/components/schemas/StatusUsuario"
        papeis:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/PapelUsuario"
        acoesPermitidas:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/AcaoPermitidaUsuario"
        criadoEm:
          type: string
          format: date-time
        atualizadoEm:
          type: string
          format: date-time
    StatusUsuario:
      type: string
      enum: [ATIVO, INATIVO, BLOQUEADO]
    PapelUsuario:
      type: string
      enum: [administrativo, mecanico, recepcionista]
    AcaoPermitidaUsuario:
      type: string
      enum: [ATUALIZAR_DADOS, BLOQUEAR, REATIVAR, INATIVAR]
    ClienteCreateRequest:
      type: object
      required: [nome, documento]
      properties:
        nome:
          type: string
        documento:
          type: string
        telefone:
          type: string
        email:
          type: string
          format: email
    ClienteUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/ClienteCreateRequest"
    Cliente:
      allOf:
        - $ref: "#/components/schemas/ClienteCreateRequest"
        - type: object
          required: [clienteId, criadoEm, atualizadoEm]
          properties:
            clienteId:
              type: string
              format: uuid
            criadoEm:
              type: string
              format: date-time
            atualizadoEm:
              type: string
              format: date-time
    VeiculoCreateRequest:
      type: object
      required: [placa, marca, modelo]
      properties:
        placa:
          type: string
        marca:
          type: string
        modelo:
          type: string
        ano:
          type: integer
          minimum: 1900
    VeiculoUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/VeiculoCreateRequest"
    Veiculo:
      allOf:
        - $ref: "#/components/schemas/VeiculoCreateRequest"
        - type: object
          required: [veiculoId, clienteId, criadoEm, atualizadoEm]
          properties:
            veiculoId:
              type: string
              format: uuid
            clienteId:
              type: string
              format: uuid
            criadoEm:
              type: string
              format: date-time
            atualizadoEm:
              type: string
              format: date-time
    OrdemServicoCreateRequest:
      type: object
      required: [clienteId, veiculoId, descricaoProblema]
      properties:
        clienteId:
          type: string
          format: uuid
        veiculoId:
          type: string
          format: uuid
        descricaoProblema:
          type: string
    OrdemServico:
      allOf:
        - $ref: "#/components/schemas/OrdemServicoCreateRequest"
        - type: object
          required: [ordemServicoId, estado, servicos, pecas, criadoEm, atualizadoEm, acoesPermitidas]
          properties:
            ordemServicoId:
              type: string
              format: uuid
            estado:
              $ref: "#/components/schemas/EstadoOrdemServico"
            servicos:
              type: array
              items:
                $ref: "#/components/schemas/ItemServicoOrdemServico"
            pecas:
              type: array
              items:
                $ref: "#/components/schemas/ItemPecaOrdemServico"
            criadoEm:
              type: string
              format: date-time
            atualizadoEm:
              type: string
              format: date-time
            acoesPermitidas:
              type: array
              items:
                $ref: "#/components/schemas/AcaoPermitidaOrdemServico"
    AcaoPermitidaOrdemServico:
      type: string
      enum: [INICIAR_DIAGNOSTICO, INCLUIR_SERVICO, INCLUIR_PECA, CONCLUIR_DIAGNOSTICO, RETOMAR_DIAGNOSTICO, INICIAR_EXECUCAO, FINALIZAR, ENTREGAR, CANCELAR]
    IncluirServicoOrdemServicoRequest:
      type: object
      required: [servicoId, quantidade]
      additionalProperties: false
      properties:
        servicoId:
          type: string
          format: uuid
        quantidade:
          type: number
          format: decimal
          exclusiveMinimum: 0
    IncluirPecaOrdemServicoRequest:
      type: object
      required: [pecaId, quantidade]
      additionalProperties: false
      properties:
        pecaId:
          type: string
          format: uuid
        quantidade:
          type: number
          format: decimal
          exclusiveMinimum: 0
    ItemServicoOrdemServico:
      type: object
      required: [servicoId, nome, quantidade, valorUnitario, valorTotal]
      additionalProperties: false
      properties:
        servicoId:
          type: string
          format: uuid
        nome:
          type: string
        quantidade:
          type: number
          format: decimal
          exclusiveMinimum: 0
        valorUnitario:
          type: number
          format: decimal
          minimum: 0
        valorTotal:
          type: number
          format: decimal
          minimum: 0
    ItemPecaOrdemServico:
      type: object
      required: [pecaId, nome, quantidade, valorUnitario, valorTotal]
      additionalProperties: false
      properties:
        pecaId:
          type: string
          format: uuid
        nome:
          type: string
        quantidade:
          type: number
          format: decimal
          exclusiveMinimum: 0
        valorUnitario:
          type: number
          format: decimal
          minimum: 0
        valorTotal:
          type: number
          format: decimal
          minimum: 0
    EstadoOrdemServico:
      type: string
      enum: [RECEBIDA, EM_DIAGNOSTICO, AGUARDANDO_APROVACAO, EM_EXECUCAO, FINALIZADA, ENTREGUE]
    AlterarEstadoRequest:
      type: object
      required: [estado]
      properties:
        estado:
          $ref: "#/components/schemas/EstadoOrdemServico"
        motivo:
          type: string
    HistoricoOrdemServico:
      type: object
      required: [estado, dataDoEstado]
      properties:
        estado:
          $ref: "#/components/schemas/EstadoOrdemServico"
        dataDoEstado:
          type: string
          format: date-time
        motivo:
          type: string
    CancelamentoRequest:
      type: object
      properties:
        motivo:
          type: string
    OperacaoAssincrona:
      type: object
      required: [status, solicitadoEm]
      properties:
        status:
          type: string
          example: ACEITO
        solicitadoEm:
          type: string
          format: date-time
    PageResponse:
      type: object
      required: [items, page, size, totalItems, totalPages]
      properties:
        items:
          type: array
          items: {}
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer
    ErrorResponse:
      type: object
      required: [timestamp, status, error, code, message, path, correlationId]
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-06-23T15:30:00Z"
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Campo obrigatorio ausente.
        path:
          type: string
          example: /api/v1/ordens-servico
        correlationId:
          type: string
          example: 7f4d0c4b6b8a4bb8a2f49bb8f06e1c3d
        requestId:
          type: string
          format: uuid
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        traceId:
          type: string
          example: 4bf92f3577b34da6a3ce929d0e0e4736
        spanId:
          type: string
          example: 00f067aa0ba902b7
        service:
          type: string
          example: oficina-os-service
        logReference:
          type: string
          example: oficina-os-service/2026-06-23/7f4d0c4b6b8a4bb8a2f49bb8f06e1c3d
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        field:
          type: string
          example: clienteId
        code:
          type: string
          example: REQUIRED
        message:
          type: string
          example: Campo obrigatorio.
