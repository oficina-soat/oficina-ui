name: UI Quality Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

concurrency:
  group: oficina-ui-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    name: Build, tests and security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Install dependencies reproducibly
        run: npm ci

      - name: Run quality checks
        run: npm run validate

      - name: Validate container and Kubernetes assets
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize k8s/overlays/lab > /tmp/oficina-ui-k8s.yaml
          grep -q 'image: IMAGE_PLACEHOLDER' /tmp/oficina-ui-k8s.yaml
          grep -q 'nodePort: 30084' /tmp/oficina-ui-k8s.yaml
          docker build --tag "oficina-ui:quality-${GITHUB_SHA}" .
          docker run --rm --read-only \
            --add-host mailhog:127.0.0.1 \
            --tmpfs /tmp:uid=101,gid=101 \
            --tmpfs /var/cache/nginx:uid=101,gid=101 \
            --tmpfs /var/run:uid=101,gid=101 \
            "oficina-ui:quality-${GITHUB_SHA}" nginx -t

      - name: Upload production build
        uses: actions/upload-artifact@v6
        with:
          name: oficina-ui-production-${{ github.sha }}
          path: dist/oficina-ui/browser
          if-no-files-found: error
          retention-days: 7

  e2e:
    name: E2E, keyboard and accessibility
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies reproducibly
        run: npm ci

      - name: Cache Playwright browser
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run isolated E2E tests
        run: npm run test:e2e

      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: oficina-ui-e2e-${{ github.sha }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
