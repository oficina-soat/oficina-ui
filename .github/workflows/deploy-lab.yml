name: Deploy UI Lab

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: oficina-ui-lab
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'us-east-1' }}
  TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
  UI_API_BASE_URL: ${{ vars.UI_API_BASE_URL }}
  UI_AUTH_BASE_URL: ${{ vars.UI_AUTH_BASE_URL }}
  UI_OBSERVABILITY_ENDPOINT: ${{ vars.UI_OBSERVABILITY_ENDPOINT }}

jobs:
  quality-gate:
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout UI deployment assets
        uses: actions/checkout@v6

      - name: Download validated production build
        uses: actions/download-artifact@v7
        with:
          name: oficina-ui-production-${{ github.sha }}
          path: dist/oficina-ui/browser

      - name: Checkout optional infrastructure
        uses: actions/checkout@v6
        with:
          repository: oficina-soat/oficina-infra
          ref: main
          path: infrastructure

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Resolve backend configuration
        id: backend
        working-directory: infrastructure
        shell: bash
        run: ./scripts/actions/resolve-terraform-backend.sh >> "${GITHUB_OUTPUT}"

      - name: Read canonical runtime endpoints
        id: runtime
        working-directory: infrastructure/terraform/environments/lab
        env:
          RESOLVED_TF_STATE_BUCKET: ${{ steps.backend.outputs.bucket }}
          RESOLVED_TF_STATE_REGION: ${{ steps.backend.outputs.region }}
          RESOLVED_TF_STATE_DYNAMODB_TABLE: ${{ steps.backend.outputs.dynamodb_table }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "-backend-config=bucket=${RESOLVED_TF_STATE_BUCKET}"
            "-backend-config=key=oficina/lab/infra/terraform.tfstate"
            "-backend-config=region=${RESOLVED_TF_STATE_REGION}"
          )
          if [[ -n "${RESOLVED_TF_STATE_DYNAMODB_TABLE:-}" ]]; then
            args+=("-backend-config=dynamodb_table=${RESOLVED_TF_STATE_DYNAMODB_TABLE}")
          fi
          terraform init -input=false "${args[@]}"
          endpoint="$(terraform output -raw api_gateway_endpoint)"
          if [[ -z "${endpoint}" || "${endpoint}" == null ]]; then
            echo "O state principal não possui api_gateway_endpoint." >&2
            exit 1
          fi
          {
            echo "api_base_url=${UI_API_BASE_URL:-${endpoint%/}/api/v1}"
            echo "auth_base_url=${UI_AUTH_BASE_URL:-${endpoint%/}}"
          } >> "${GITHUB_OUTPUT}"

      - name: Ensure optional workload infrastructure
        id: hosting
        working-directory: infrastructure/terraform/optional/ui-hosting/lab
        env:
          RESOLVED_TF_STATE_BUCKET: ${{ steps.backend.outputs.bucket }}
          RESOLVED_TF_STATE_REGION: ${{ steps.backend.outputs.region }}
          RESOLVED_TF_STATE_DYNAMODB_TABLE: ${{ steps.backend.outputs.dynamodb_table }}
          TF_VAR_main_state_bucket: ${{ steps.backend.outputs.bucket }}
          TF_VAR_main_state_region: ${{ steps.backend.outputs.region }}
          TF_VAR_region: ${{ vars.AWS_REGION || 'us-east-1' }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "-backend-config=bucket=${RESOLVED_TF_STATE_BUCKET}"
            "-backend-config=key=oficina/lab/optional/ui-hosting/terraform.tfstate"
            "-backend-config=region=${RESOLVED_TF_STATE_REGION}"
          )
          if [[ -n "${RESOLVED_TF_STATE_DYNAMODB_TABLE:-}" ]]; then
            args+=("-backend-config=dynamodb_table=${RESOLVED_TF_STATE_DYNAMODB_TABLE}")
          fi
          terraform init -input=false "${args[@]}"
          terraform apply -input=false -auto-approve
          {
            echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)"
            echo "cluster_name=$(terraform output -raw eks_cluster_name)"
            echo "url=$(terraform output -raw ui_url)"
            echo "observability_endpoint=$(terraform output -raw ui_observability_endpoint)"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate runtime endpoints
        env:
          RESOLVED_UI_API_BASE_URL: ${{ steps.runtime.outputs.api_base_url }}
          RESOLVED_UI_AUTH_BASE_URL: ${{ steps.runtime.outputs.auth_base_url }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "${RESOLVED_UI_API_BASE_URL}" =~ ^https://[^/]+/.+ ]] || {
            echo "UI_API_BASE_URL deve ser uma URL HTTPS completa, incluindo /api/v1." >&2
            exit 1
          }
          [[ "${RESOLVED_UI_AUTH_BASE_URL}" =~ ^https://[^/]+/?$ ]] || {
            echo "UI_AUTH_BASE_URL deve conter somente o origin HTTPS da API de autenticação." >&2
            exit 1
          }

      - name: Create runtime and deployment metadata
        env:
          RESOLVED_UI_API_BASE_URL: ${{ steps.runtime.outputs.api_base_url }}
          RESOLVED_UI_AUTH_BASE_URL: ${{ steps.runtime.outputs.auth_base_url }}
          DEFAULT_UI_OBSERVABILITY_ENDPOINT: ${{ steps.hosting.outputs.observability_endpoint }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/oficina-ui/browser/config
          jq -n \
            --arg apiBaseUrl "${RESOLVED_UI_API_BASE_URL%/}" \
            --arg authBaseUrl "${RESOLVED_UI_AUTH_BASE_URL%/}" \
            --arg observabilityEndpoint "${UI_OBSERVABILITY_ENDPOINT:-${DEFAULT_UI_OBSERVABILITY_ENDPOINT}}" \
            --arg release "${GITHUB_SHA}" \
            '{apiBaseUrl: $apiBaseUrl, authBaseUrl: $authBaseUrl}
              + if $observabilityEndpoint == "" then {}
                else {observability: {
                  endpoint: $observabilityEndpoint,
                  environment: "lab",
                  release: $release
                }}
                end' \
            > dist/oficina-ui/browser/config/runtime-config.json
          jq -n \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg revision "${GITHUB_SHA}" \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg deployedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{repository: $repository, revision: $revision, runId: $runId, deployedAt: $deployedAt}' \
            > dist/oficina-ui/browser/deploy-metadata.json

      - name: Build and publish validated image
        env:
          ECR_REPOSITORY_URL: ${{ steps.hosting.outputs.ecr_repository_url }}
        shell: bash
        run: |
          set -euo pipefail
          registry="${ECR_REPOSITORY_URL%%/*}"
          aws ecr get-login-password | docker login --username AWS --password-stdin "${registry}"
          docker build --tag "${ECR_REPOSITORY_URL}:${GITHUB_SHA}" .
          docker tag "${ECR_REPOSITORY_URL}:${GITHUB_SHA}" "${ECR_REPOSITORY_URL}:latest"
          docker push "${ECR_REPOSITORY_URL}:${GITHUB_SHA}"
          docker push "${ECR_REPOSITORY_URL}:latest"

      - name: Deploy workload to EKS
        env:
          ECR_REPOSITORY_URL: ${{ steps.hosting.outputs.ecr_repository_url }}
          EKS_CLUSTER_NAME: ${{ steps.hosting.outputs.cluster_name }}
        shell: bash
        run: |
          set -euo pipefail
          image="${ECR_REPOSITORY_URL}:${GITHUB_SHA}"
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"
          kubectl create configmap oficina-ui-runtime \
            --from-file=runtime-config.json=dist/oficina-ui/browser/config/runtime-config.json \
            --from-file=deploy-metadata.json=dist/oficina-ui/browser/deploy-metadata.json \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl kustomize k8s/overlays/lab \
            | sed "s|IMAGE_PLACEHOLDER|${image}|g" \
            | kubectl apply -f -
          kubectl rollout status deployment/oficina-ui --timeout=300s

      - name: Publish deployment summary
        shell: bash
        run: |
          {
            echo "### Oficina UI Lab"
            echo
            echo "- URL: ${{ steps.hosting.outputs.url }}"
            echo "- Image: \`${{ steps.hosting.outputs.ecr_repository_url }}:${GITHUB_SHA}\`"
            echo "- Revision: \`${GITHUB_SHA}\`"
            echo "- Run: \`${GITHUB_RUN_ID}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
