name: Deploy UI Lab

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: oficina-ui-lab
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'us-east-1' }}
  TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
  UI_API_BASE_URL: ${{ vars.UI_API_BASE_URL }}
  UI_AUTH_BASE_URL: ${{ vars.UI_AUTH_BASE_URL }}
  UI_OBSERVABILITY_ENDPOINT: ${{ vars.UI_OBSERVABILITY_ENDPOINT }}

jobs:
  quality-gate:
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download validated production build
        uses: actions/download-artifact@v7
        with:
          name: oficina-ui-production-${{ github.sha }}
          path: dist/oficina-ui/browser

      - name: Checkout optional infrastructure
        uses: actions/checkout@v6
        with:
          repository: oficina-soat/oficina-infra
          ref: main
          path: infrastructure

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Resolve backend configuration
        id: backend
        working-directory: infrastructure
        shell: bash
        run: ./scripts/actions/resolve-terraform-backend.sh >> "${GITHUB_OUTPUT}"

      - name: Read canonical runtime endpoints
        id: runtime
        working-directory: infrastructure/terraform/environments/lab
        env:
          RESOLVED_TF_STATE_BUCKET: ${{ steps.backend.outputs.bucket }}
          RESOLVED_TF_STATE_REGION: ${{ steps.backend.outputs.region }}
          RESOLVED_TF_STATE_DYNAMODB_TABLE: ${{ steps.backend.outputs.dynamodb_table }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "-backend-config=bucket=${RESOLVED_TF_STATE_BUCKET}"
            "-backend-config=key=oficina/lab/infra/terraform.tfstate"
            "-backend-config=region=${RESOLVED_TF_STATE_REGION}"
          )
          if [[ -n "${RESOLVED_TF_STATE_DYNAMODB_TABLE:-}" ]]; then
            args+=("-backend-config=dynamodb_table=${RESOLVED_TF_STATE_DYNAMODB_TABLE}")
          fi
          terraform init -input=false "${args[@]}"
          endpoint="$(terraform output -raw api_gateway_endpoint)"
          if [[ -z "${endpoint}" || "${endpoint}" == null ]]; then
            echo "O state principal não possui api_gateway_endpoint." >&2
            exit 1
          fi
          {
            echo "api_base_url=${UI_API_BASE_URL:-${endpoint%/}/api/v1}"
            echo "auth_base_url=${UI_AUTH_BASE_URL:-${endpoint%/}}"
          } >> "${GITHUB_OUTPUT}"

      - name: Read isolated hosting outputs
        id: hosting
        working-directory: infrastructure/terraform/optional/ui-hosting/lab
        env:
          RESOLVED_TF_STATE_BUCKET: ${{ steps.backend.outputs.bucket }}
          RESOLVED_TF_STATE_REGION: ${{ steps.backend.outputs.region }}
          RESOLVED_TF_STATE_DYNAMODB_TABLE: ${{ steps.backend.outputs.dynamodb_table }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "-backend-config=bucket=${RESOLVED_TF_STATE_BUCKET}"
            "-backend-config=key=oficina/lab/optional/ui-hosting/terraform.tfstate"
            "-backend-config=region=${RESOLVED_TF_STATE_REGION}"
          )
          if [[ -n "${RESOLVED_TF_STATE_DYNAMODB_TABLE:-}" ]]; then
            args+=("-backend-config=dynamodb_table=${RESOLVED_TF_STATE_DYNAMODB_TABLE}")
          fi
          terraform init -input=false "${args[@]}"
          bucket="$(terraform output -raw bucket_name)"
          distribution="$(terraform output -raw cloudfront_distribution_id)"
          url="$(terraform output -raw ui_url)"
          if [[ -z "${bucket}" || -z "${distribution}" || -z "${url}" ]]; then
            echo "A hospedagem opcional não está aplicada. Execute UI Hosting Lab com action=apply no oficina-infra." >&2
            exit 1
          fi
          {
            echo "bucket=${bucket}"
            echo "distribution=${distribution}"
            echo "url=${url}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate runtime endpoints
        env:
          RESOLVED_UI_API_BASE_URL: ${{ steps.runtime.outputs.api_base_url }}
          RESOLVED_UI_AUTH_BASE_URL: ${{ steps.runtime.outputs.auth_base_url }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "${RESOLVED_UI_API_BASE_URL}" =~ ^https://[^/]+/.+ ]] || {
            echo "UI_API_BASE_URL deve ser uma URL HTTPS completa, incluindo /api/v1." >&2
            exit 1
          }
          [[ "${RESOLVED_UI_AUTH_BASE_URL}" =~ ^https://[^/]+/?$ ]] || {
            echo "UI_AUTH_BASE_URL deve conter somente o origin HTTPS da API de autenticação." >&2
            exit 1
          }

      - name: Create runtime and deployment metadata
        env:
          RESOLVED_UI_API_BASE_URL: ${{ steps.runtime.outputs.api_base_url }}
          RESOLVED_UI_AUTH_BASE_URL: ${{ steps.runtime.outputs.auth_base_url }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/oficina-ui/browser/config
          jq -n \
            --arg apiBaseUrl "${RESOLVED_UI_API_BASE_URL%/}" \
            --arg authBaseUrl "${RESOLVED_UI_AUTH_BASE_URL%/}" \
            --arg observabilityEndpoint "${UI_OBSERVABILITY_ENDPOINT%/}" \
            --arg release "${GITHUB_SHA}" \
            '{apiBaseUrl: $apiBaseUrl, authBaseUrl: $authBaseUrl}
              + if $observabilityEndpoint == "" then {}
                else {observability: {
                  endpoint: $observabilityEndpoint,
                  environment: "lab",
                  release: $release
                }}
                end' \
            > dist/oficina-ui/browser/config/runtime-config.json
          jq -n \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg revision "${GITHUB_SHA}" \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg deployedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{repository: $repository, revision: $revision, runId: $runId, deployedAt: $deployedAt}' \
            > dist/oficina-ui/browser/deploy-metadata.json

      - name: Upload immutable artifacts
        shell: bash
        run: |
          aws s3 sync dist/oficina-ui/browser "s3://${{ steps.hosting.outputs.bucket }}" \
            --delete \
            --exclude index.html \
            --exclude config/runtime-config.json \
            --exclude deploy-metadata.json \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload entrypoint and runtime files without cache
        shell: bash
        run: |
          bucket="s3://${{ steps.hosting.outputs.bucket }}"
          aws s3 cp dist/oficina-ui/browser/index.html "${bucket}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache,no-store,must-revalidate"
          aws s3 cp dist/oficina-ui/browser/config/runtime-config.json \
            "${bucket}/config/runtime-config.json" \
            --content-type "application/json" \
            --cache-control "no-cache,no-store,must-revalidate"
          aws s3 cp dist/oficina-ui/browser/deploy-metadata.json \
            "${bucket}/deploy-metadata.json" \
            --content-type "application/json" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate mutable CloudFront paths
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.hosting.outputs.distribution }}" \
            --paths "/" "/index.html" "/config/*" "/deploy-metadata.json"

      - name: Publish deployment summary
        shell: bash
        run: |
          {
            echo "### Oficina UI Lab"
            echo
            echo "- URL: ${{ steps.hosting.outputs.url }}"
            echo "- Revision: \`${GITHUB_SHA}\`"
            echo "- Run: \`${GITHUB_RUN_ID}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
