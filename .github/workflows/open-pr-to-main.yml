name: Open PR To Main

on:
  push:
    branches:
      - develop

concurrency:
  group: open-pr-to-main-${{ github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality-gate:
    name: Validate develop
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  open-pull-request-to-main:
    needs: quality-gate
    name: Open pull request to main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Open or update pull request to main
        shell: bash
        env:
          BASE_BRANCH: main
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          find_existing_pr_number() {
            local candidate_head=""
            local pr_number=""

            for candidate_head in "${GITHUB_REPOSITORY_OWNER}:${HEAD_BRANCH}" "${HEAD_BRANCH}"; do
              pr_number="$(
                gh pr list \
                  --repo "${GITHUB_REPOSITORY}" \
                  --base "${BASE_BRANCH}" \
                  --head "${candidate_head}" \
                  --state open \
                  --json number \
                  --jq '.[0].number // empty'
              )"

              if [[ -n "${pr_number}" ]]; then
                printf '%s\n' "${pr_number}"
                return
              fi
            done
          }

          git fetch origin \
            "+refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}" \
            "+refs/heads/${HEAD_BRANCH}:refs/remotes/origin/${HEAD_BRANCH}"

          if git diff --quiet "origin/${BASE_BRANCH}...origin/${HEAD_BRANCH}" -- .; then
            echo "Branch ${HEAD_BRANCH} nao possui diferencas de conteudo em relacao a ${BASE_BRANCH}; PR nao sera criado."
            exit 0
          fi

          version="$(node -p "require('./package.json').version")"
          title="Atualizar ${BASE_BRANCH} com ${HEAD_BRANCH} - oficina-ui v${version}"
          body="$(printf '%s\n\n%s\n%s\n%s\n%s\n' \
            "PR automatico preparado apos as validacoes de qualidade e testes da UI." \
            "- Versao: ${version}" \
            "- Branch origem: ${HEAD_BRANCH}" \
            "- Branch destino: ${BASE_BRANCH}" \
            "- Commit validado: ${GITHUB_SHA}")"
          existing_pr_number="$(find_existing_pr_number)"

          if [[ -n "${existing_pr_number}" ]]; then
            gh pr edit "${existing_pr_number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --body "${body}"
            exit 0
          fi

          gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base "${BASE_BRANCH}" \
            --head "${GITHUB_REPOSITORY_OWNER}:${HEAD_BRANCH}" \
            --title "${title}" \
            --body "${body}"
